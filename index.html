<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f1226,#1a1d3a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1c1f3a;
padding:25px;
border-radius:18px;
width:400px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
width:90%;
}

button{
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

#panel{display:none;}

video{
width:100%;
margin-top:10px;
border-radius:12px;
display:none;
}

.stats{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

.list{
margin-top:10px;
background:#0f1226;
padding:10px;
border-radius:10px;
max-height:120px;
overflow:auto;
text-align:left;
font-size:13px;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="card">

<h2>🧠 ¿Eliminar servidor Discord?</h2>

<input id="nombre" placeholder="Tu nombre">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Hola <span id="user"></span></h3>

<button class="si" onclick="votar('si')">💀 Sí</button>
<button class="no" onclick="votar('no')">🛡️ No</button>

<p id="msg"></p>

<div class="stats">
✔ Sí: <span id="siCount">0</span> |
❌ No: <span id="noCount">0</span>
</div>

<video id="video" controls></video>

<h4>👥 Votantes</h4>
<div class="list">
<ul id="lista"></ul>
</div>

</div>

</div>

<script>

// 🔥 TU FIREBASE
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "votacion-server.firebaseapp.com",
databaseURL: "https://votacion-server-default-rtdb.firebaseio.com",
projectId: "votacion-server",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="";
let voted=false;

function entrar(){
user=document.getElementById("nombre").value;

if(!user){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
}

function votar(op){

if(voted){
alert("❌ Ya votaste");
return;
}

voted=true;

// guardar voto
db.ref("votos/"+op).transaction(n=> (n||0)+1);

// guardar usuario
db.ref("usuarios").push(user);

// UI
let msg=document.getElementById("msg");
let video=document.getElementById("video");

video.style.display="block";

if(op==="si"){
msg.innerText="💀 La comunidad quiere ELIMINAR el server...";
video.src="ssstik.io_@pibbledipple_1778120515212.mp4";
}else{
msg.innerText="🛡️ La comunidad quiere MANTENER el server...";
video.src="ssstik.io_@osdanone_1781160056885.mp4";
}

}

// 🔄 contador en vivo
db.ref("votos").on("value", snap=>{
let d=snap.val()||{};
document.getElementById("siCount").innerText=d.si||0;
document.getElementById("noCount").innerText=d.no||0;
});

// 👥 lista en vivo
db.ref("usuarios").on("value", snap=>{
let data=snap.val()||{};
let lista=document.getElementById("lista");
lista.innerHTML="";

Object.values(data).forEach(name=>{
let li=document.createElement("li");
li.innerText=name;
lista.appendChild(li);
});
});

</script>

</body>
</html>
