<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f1226,#1a1d3a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1c1f3a;
padding:25px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
width:90%;
}

button{
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

#panel{display:none;}

video{
width:100%;
margin-top:10px;
border-radius:12px;
display:none;
}

.stats{
margin-top:10px;
font-size:14px;
opacity:0.8;
}
</style>

</head>

<body>

<div class="card">

<h2>🧠 ¿Eliminar servidor Discord?</h2>

<input id="nombre" placeholder="Tu nombre">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Hola <span id="user"></span></h3>

<button class="si" onclick="votar('si')">💀 Sí</button>
<button class="no" onclick="votar('no')">🛡️ No</button>

<p id="msg"></p>

<div class="stats">
✔ Sí: <span id="siCount">0</span> |
❌ No: <span id="noCount">0</span>
</div>

<video id="video" controls></video>

</div>

</div>

<script>

let user="";
let yaVoto=false;

function entrar(){
user=document.getElementById("nombre").value;

if(!user){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
}

function votar(op){

if(yaVoto){
alert("Ya votaste");
return;
}

yaVoto=true;

let msg=document.getElementById("msg");
let video=document.getElementById("video");

video.style.display="block";

// 🔥 VIDEOS CORREGIDOS (TUS ARCHIVOS REALES)
if(op==="si"){
msg.innerText="💀 La comunidad quiere ELIMINAR el servidor...";
video.src="ssstik.io_@pibbledipple_1778120515212.mp4";
}else{
msg.innerText="🛡️ La comunidad quiere MANTENER el servidor...";
video.src="ssstik.io_@osdanone_1781160056885.mp4";
}

}

</script>

</body>
</html>
