<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Decisión Server Discord</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f1226,#1a1d3a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1c1f3a;
padding:25px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
font-size:20px;
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:15px;
}

input{
width:90%;
padding:10px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:10px;
width:45%;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

#panel{display:none;margin-top:15px;}

#msg{
margin-top:10px;
font-size:16px;
}

video{
width:100%;
margin-top:10px;
border-radius:12px;
display:none;
}

.list{
margin-top:10px;
text-align:left;
font-size:13px;
opacity:0.9;
max-height:100px;
overflow:auto;
background:#0f1226;
padding:10px;
border-radius:10px;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="card">

<h1>🧠 ¿Eliminamos el server de Discord?</h1>
<p class="subtitle">Vota y mira lo que decide la comunidad</p>

<input id="nombre" placeholder="Tu nombre">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Hola <span id="user"></span></h3>

<button class="si" onclick="votar('si')">💀 Sí</button>
<button class="no" onclick="votar('no')">🛡️ No</button>

<p id="msg"></p>

<p>✔ Sí: <span id="siCount">0</span> | ❌ No: <span id="noCount">0</span></p>

<div class="list">
<b>Votaron:</b>
<ul id="lista"></ul>
</div>

<video id="video" controls></video>

</div>

</div>

<script>

// 🔥 PEGA TU CONFIG AQUÍ
const firebaseConfig = {
apiKey: "AIzaSyA2SgyB_hF3rSGIpVMiNdKk_P-1E6xxGyM",
authDomain: "votacion-server.firebaseapp.com",
databaseURL: "https://votacion-server-default-rtdb.firebaseio.com",
projectId: "votacion-server",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="";
let yaVoto=false;

function entrar(){
user=document.getElementById("nombre").value;

if(!user){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
}

function votar(op){

if(yaVoto){
alert("Ya votaste");
return;
}

yaVoto=true;

// guardar votos
db.ref("votos/"+op).transaction(n=> (n||0)+1);

// guardar nombre
db.ref("usuarios").push(user);

// mensaje
document.getElementById("msg").innerText=
op==="si" ? "💀 La comunidad quiere eliminarlo..." : "🛡️ La comunidad quiere mantenerlo";

// video
let video=document.getElementById("video");
video.style.display="block";
video.src = op==="si" ? "si.mp4" : "no.mp4";
}

// contador en vivo
db.ref("votos").on("value", snap=>{
let d=snap.val()||{};
document.getElementById("siCount").innerText=d.si||0;
document.getElementById("noCount").innerText=d.no||0;
});

// lista de usuarios
db.ref("usuarios").on("value", snap=>{
let data=snap.val()||{};
let lista=document.getElementById("lista");
lista.innerHTML="";

Object.values(data).forEach(name=>{
let li=document.createElement("li");
li.innerText=name;
lista.appendChild(li);
});
});

</script>

</body>
</html>
