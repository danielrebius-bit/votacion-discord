<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f1226,#1a1d3a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:#1c1f3a;
padding:25px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
animation:pop 0.4s ease;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
width:90%;
}

button{
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.si{background:#ff4d4d;color:white;}
.no{background:#43b581;color:white;}

#panel{display:none;}

video{
width:100%;
margin-top:10px;
border-radius:12px;
display:none;
}

.list{
margin-top:10px;
text-align:left;
font-size:13px;
opacity:0.9;
max-height:100px;
overflow:auto;
background:#0f1226;
padding:10px;
border-radius:10px;
}

.glow{
animation:glow 0.6s ease;
}

@keyframes glow{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>

</head>

<body>

<div class="card">

<h2>🧠 ¿Eliminar servidor Discord?</h2>

<input id="nombre" placeholder="Tu nombre">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Hola <span id="user"></span></h3>

<button class="si glow" onclick="votar('si')">💀 Sí</button>
<button class="no glow" onclick="votar('no')">🛡️ No</button>

<p id="msg"></p>

<p>✔ Sí: <span id="siCount">0</span> | ❌ No: <span id="noCount">0</span></p>

<video id="video" controls></video>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

</div>

</div>

<script>

let user="";
let voted=false;

// anti spam básico
function entrar(){
user=document.getElementById("nombre").value;

if(!user){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
}

// sonido
function playSound(){
document.getElementById("sound").play();
}

function votar(op){

if(voted){
alert("❌ Ya votaste");
return;
}

voted=true;
playSound();

let msg=document.getElementById("msg");
let video=document.getElementById("video");

video.style.display="block";

// FIX VIDEO (IMPORTANTE)
if(op==="si"){
msg.innerText="💀 La comunidad quiere eliminarlo...";
video.src="si.mp4";
}else{
msg.innerText="🛡️ La comunidad quiere mantenerlo...";
video.src="no.mp4";
}

// animación Discord vibe
document.querySelector(".card").classList.add("glow");
setTimeout(()=>{
document.querySelector(".card").classList.remove("glow");
},600);
}

</script>

</body>
</html>
