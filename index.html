<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Decisión del servidor</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1b1f3a,#0a0c18);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background: rgba(28,31,58,0.75);
backdrop-filter: blur(15px);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:18px;
width:420px;
text-align:center;
box-shadow:0 0 35px rgba(0,0,0,0.6);
animation:pop 0.4s ease;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h2{
font-size:18px;
font-weight:600;
letter-spacing:0.5px;
margin-bottom:10px;
}

input{
width:90%;
padding:10px;
border-radius:10px;
border:none;
outline:none;
background:#0f1226;
color:white;
margin-bottom:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
width:90%;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.si{
background:#d9534f;
}

.no{
background:#2ecc71;
}

#panel{display:none;}

#msg{
margin-top:10px;
font-size:14px;
opacity:0.9;
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

.stats{
margin-top:10px;
font-size:13px;
background:#0f1226;
padding:8px;
border-radius:10px;
opacity:0.9;
}

.list{
margin-top:10px;
background:#0f1226;
padding:10px;
border-radius:10px;
max-height:120px;
overflow:auto;
text-align:left;
font-size:12px;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="card">

<h2>Decisión del servidor</h2>

<input id="nombre" placeholder="Nombre de usuario">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Usuario: <span id="user"></span></h3>

<button class="si" onclick="votar('si')">Eliminar servidor</button>
<button class="no" onclick="votar('no')">Mantener servidor</button>

<p id="msg"></p>

<div class="stats">
Eliminar: <span id="siCount">0</span> |
Mantener: <span id="noCount">0</span>
</div>

<h4>Participantes</h4>
<div class="list">
<ul id="lista"></ul>
</div>

<video id="video" controls></video>

</div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "votacion-server.firebaseapp.com",
databaseURL: "https://votacion-server-default-rtdb.firebaseio.com",
projectId: "votacion-server",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="";
let voted=false;

// entrar
function entrar(){
user=document.getElementById("nombre").value;

if(!user){
alert("Ingrese un nombre");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
}

// votar
function votar(op){

if(voted){
alert("Ya ha votado");
return;
}

voted=true;

// guardar datos
db.ref("votos/"+op).transaction(n=> (n||0)+1);
db.ref("usuarios").push(user);

// UI
let msg=document.getElementById("msg");
let video=document.getElementById("video");

video.style.display="block";
video.pause();
video.currentTime=0;

if(op==="si"){
msg.innerHTML="✔ Voto registrado: eliminar servidor<br><span style='opacity:0.7'>Registro enviado correctamente</span>";
video.src="si.mp4";
}else{
msg.innerHTML="✔ Voto registrado: mantener servidor<br><span style='opacity:0.7'>Registro enviado correctamente</span>";
video.src="no.mp4";
}

video.load();
video.play().catch(()=>{});

}

// contador en vivo
db.ref("votos").on("value", snap=>{
let d=snap.val()||{};
document.getElementById("siCount").innerText=d.si||0;
document.getElementById("noCount").innerText=d.no||0;
});

// lista usuarios
db.ref("usuarios").on("value", snap=>{
let data=snap.val()||{};
let lista=document.getElementById("lista");
lista.innerHTML="";

Object.values(data).forEach(name=>{
let li=document.createElement("li");
li.innerText=name;
lista.appendChild(li);
});
});

</script>

</body>
</html>
