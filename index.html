<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación - Modo Dios</title>

<style>
body{
margin:0;
font-family: 'Arial', sans-serif;
background: radial-gradient(circle at top,#1b1f3a,#0b0d1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CARD GLASS */
.card{
background: rgba(28,31,58,0.75);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow: 0 0 40px rgba(0,0,0,0.6);
animation: floatIn 0.5s ease;
}

@keyframes floatIn{
from{transform:translateY(20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

h2{
font-size:20px;
margin-bottom:10px;
letter-spacing:1px;
}

/* INPUT */
input{
width:90%;
padding:10px;
border-radius:12px;
border:none;
outline:none;
background:#0f1226;
color:white;
margin-bottom:10px;
}

/* BOTONES PRO */
button{
padding:10px;
margin:5px;
border:none;
border-radius:12px;
width:90%;
cursor:pointer;
font-weight:bold;
transition:0.2s;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button:hover{
transform:scale(1.05);
filter:brightness(1.2);
}

.si{
background: linear-gradient(45deg,#ff4d4d,#ff1a1a);
}

.no{
background: linear-gradient(45deg,#43b581,#1dbf73);
}

/* PANEL */
#panel{display:none;}

/* MENSAJE */
#msg{
margin-top:10px;
font-size:15px;
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

/* ESTADÍSTICAS */
.stats{
margin-top:10px;
font-size:14px;
opacity:0.9;
background:#0f1226;
padding:8px;
border-radius:10px;
}

/* LISTA STYLE CHAT */
.list{
margin-top:10px;
background:#0f1226;
padding:10px;
border-radius:12px;
max-height:120px;
overflow:auto;
text-align:left;
font-size:13px;
border:1px solid rgba(255,255,255,0.05);
}

/* VIDEO GOD */
video{
width:100%;
margin-top:10px;
border-radius:14px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* SCROLL BAR */
::-webkit-scrollbar{
width:6px;
}
::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="card">

<h2>💀 ¿Eliminar servidor Discord?</h2>

<input id="nombre" placeholder="Tu nombre">

<button onclick="entrar()">Entrar</button>

<div id="panel">

<h3>Hola <span id="user"></span></h3>

<button class="si" onclick="votar('si')">💀 Sí</button>
<button class="no" onclick="votar('no')">🛡️ No</button>

<p id="msg"></p>

<div class="stats">
💀 Sí: <span id="siCount">0</span> |
🛡️ No: <span id="noCount">0</span>
</div>

<h4>👥 Votantes</h4>
<div class="list">
<ul id="lista"></ul>
</div>

<video id="video" controls></video>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

</div>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "votacion-server.firebaseapp.com",
databaseURL: "https://votacion-server-default-rtdb.firebaseio.com",
projectId: "votacion-server",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="";
let voted=false;

// entrar
function entrar(){
user=document.getElementById("nombre").value;

if(!user){
alert("Escribe tu nombre");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
}

// sonido
function playSound(){
document.getElementById("sound").play();
}

// votar
function votar(op){

if(voted){
alert("❌ Ya votaste");
return;
}

voted=true;
playSound();

// guardar voto
db.ref("votos/"+op).transaction(n=> (n||0)+1);

// guardar usuario
db.ref("usuarios").push(user);

// UI
let msg=document.getElementById("msg");
let video=document.getElementById("video");

video.style.display="block";

if(op==="si"){
msg.innerHTML="💀 <b>Voto registrado:</b> eliminar servidor <br><span style='opacity:0.7'>decisión enviada</span>";
video.src="si.mp4";
}else{
msg.innerHTML="🛡️ <b>Voto registrado:</b> mantener servidor <br><span style='opacity:0.7'>decisión enviada</span>";
video.src="no.mp4";
}

}

// contador en vivo
db.ref("votos").on("value", snap=>{
let d=snap.val()||{};
document.getElementById("siCount").innerText=d.si||0;
document.getElementById("noCount").innerText=d.no||0;
});

// lista usuarios
db.ref("usuarios").on("value", snap=>{
let data=snap.val()||{};
let lista=document.getElementById("lista");
lista.innerHTML="";

Object.values(data).forEach(name=>{
let li=document.createElement("li");
li.innerText=name;
lista.appendChild(li);
});
});

</script>

</body>
</html>
